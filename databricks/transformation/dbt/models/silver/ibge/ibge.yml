version: 2

models:
  - name: ibge__states
    description: "Curated Brazilian states (UF) dataset from IBGE (silver layer). Deduplicated by natural key."
    columns:
      - name: state_id
        description: "IBGE state (UF) identifier (natural key)."
        tests: [not_null, unique]
      - name: state_name
        description: "State name."
        tests: [not_null]
      - name: state_abbreviation
        description: "State abbreviation (UF sigla)."
        tests: [not_null]
      - name: region_id
        description: "IBGE macro region identifier."
        tests: [not_null]
      - name: region_name
        description: "IBGE macro region name."
        tests: [not_null]
      - name: region_abbreviation
        description: "IBGE macro region abbreviation."
        tests: [not_null]
      - name: _ingestion_ts
        description: "Ingestion timestamp from Bronze."
        tests: [not_null]
      - name: _load_ts
        description: "Timestamp when this model row was loaded."
        tests: [not_null]

  - name: ibge__municipalities
    description: "Curated Brazilian municipalities dataset from IBGE (silver layer). Deduplicated by natural key, enriched with state, region, meso/microregion, immediate and intermediate region attributes."
    columns:
      - name: municipality_id
        description: "IBGE municipality identifier (natural key)."
        tests: [not_null, unique]
      - name: municipality_name
        description: "Municipality name."
        tests: [not_null]
      - name: state_id
        description: "IBGE state (UF) identifier."
        tests: [not_null]
      - name: state_name
        description: "State name."
        tests: [not_null]
      - name: state_abbreviation
        description: "State abbreviation (UF sigla)."
        tests: [not_null]
      - name: region_id
        description: "IBGE macro region identifier."
        tests: [not_null]
      - name: region_name
        description: "IBGE macro region name."
        tests: [not_null]
      - name: region_abbreviation
        description: "IBGE macro region abbreviation."
        tests: [not_null]
      - name: mesoregion_id
        description: "IBGE mesoregion identifier."
        tests: [not_null]
      - name: mesoregion_name
        description: "IBGE mesoregion name."
        tests: [not_null]
      - name: microregion_id
        description: "IBGE microregion identifier."
        tests: [not_null]
      - name: microregion_name
        description: "IBGE microregion name."
        tests: [not_null]
      - name: immediate_region_id
        description: "IBGE immediate region (região imediata) identifier."
        tests: [not_null]
      - name: immediate_region_name
        description: "IBGE immediate region name."
        tests: [not_null]
      - name: intermediate_region_id
        description: "IBGE intermediate region (região intermediária) identifier."
        tests: [not_null]
      - name: intermediate_region_name
        description: "IBGE intermediate region name."
        tests: [not_null]
      - name: _ingestion_ts
        description: "Ingestion timestamp from Bronze."
        tests: [not_null]
      - name: _load_ts
        description: "Timestamp when this model row was loaded."
        tests: [not_null]

  - name: ibge__indicators_by_location_year
    description: "Flattened and deduplicated IBGE indicator results by location and year (silver layer). One row per location + indicator + reference year, keeping the latest extraction."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [location_id, indicator_id, reference_year]
    columns:
      - name: location_id
        description: "IBGE location identifier (2-digit state code or 7-digit municipality code)."
        tests: [not_null]
      - name: reference_year
        description: "Reference year of the indicator value."
        tests: [not_null]
      - name: indicator_id
        description: "IBGE indicator identifier."
        tests: [not_null]
      - name: metric_value
        description: "Numeric indicator value."
        tests: [not_null]
      - name: _ingestion_ts
        description: "Ingestion timestamp from Bronze."
        tests: [not_null]
      - name: _source_file
        description: "Source file path from Auto Loader metadata."
        tests: [not_null]

  - name: ibge__cnaes
    description: "Curated CNAE subclasses dataset from IBGE (silver layer), with full hierarchy flattened: subclass → class → group → division → section."
    columns:
      - name: section_id
        description: "CNAE section identifier."
        tests: [not_null]
      - name: section_description
        description: "CNAE section description."
        tests: [not_null]
      - name: division_id
        description: "CNAE division identifier."
        tests: [not_null]
      - name: division_description
        description: "CNAE division description."
        tests: [not_null]
      - name: group_id
        description: "CNAE group identifier."
        tests: [not_null]
      - name: group_description
        description: "CNAE group description."
        tests: [not_null]
      - name: class_id
        description: "CNAE class identifier."
        tests: [not_null]
      - name: class_description
        description: "CNAE class description."
        tests: [not_null]
      - name: cnae_id
        description: "CNAE subclass identifier (natural key)."
        tests: [not_null, unique]
      - name: cnae_description
        description: "CNAE subclass description."
        tests: [not_null]
      - name: class_notes
        description: "Array of notes associated with the CNAE class."
      - name: cnae_activities
        description: "Array of CNAE subclass activity descriptions."
      - name: cnae_notes
        description: "Array of notes associated with the CNAE subclass."
      - name: _ingestion_ts
        description: "Ingestion timestamp from Bronze."
        tests: [not_null]
      - name: _load_ts
        description: "Timestamp when this model row was loaded."
        tests: [not_null]

  - name: ibge__geolocation
    description: "Curated IBGE geospatial GeoJSON dataset (silver layer), with feature-level extraction from features JSON and deduplication by location_type + location_id."
    columns:
      - name: location_type
        description: "Geographic granularity of the GeoJSON payload (municipality, state, country)."
        tests:
          - not_null
          - accepted_values:
              values: ['municipality', 'state', 'country']
      - name: geojson_type
        description: "GeoJSON top-level type (expected FeatureCollection)."
        tests:
          - not_null
          - accepted_values:
              values: ['FeatureCollection']
      - name: feature_type
        description: "GeoJSON feature type for each exploded feature (expected Feature)."
        tests:
          - not_null
          - accepted_values:
              values: ['Feature']
      - name: geometry_type
        description: "Geometry type (Polygon or MultiPolygon)."
        tests:
          - not_null
          - accepted_values:
              values: ['Polygon', 'MultiPolygon']
      - name: geometry_geojson
        description: "Complete GeoJSON geometry object serialized as JSON string, including coordinates."
        tests: [not_null]
      - name: geometry_source_format
        description: "Source format of the geometry data (always 'geojson')."
        tests:
          - not_null
          - accepted_values:
              values: ['geojson']
      - name: location_id
        description: "IBGE area code extracted from feature properties."
        tests: [not_null, unique]
      - name: _ingestion_ts
        description: "Ingestion timestamp from Bronze."
        tests: [not_null]
      - name: _load_ts
        description: "Timestamp when this model row was loaded."
        tests: [not_null]
