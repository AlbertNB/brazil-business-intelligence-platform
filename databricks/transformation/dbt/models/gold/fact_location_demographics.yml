version: 2

models:
  - name: fact_location_demographics
    description: "Gold fact table for population, territorial area, and demographic density by location and year."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [location_sk, year]
    columns:
      - name: location_sk
        description: "Surrogate key of the related location dimension (dim_location)."
        tests: [not_null]

      - name: location_nk
        description: "Natural location key aligned with dim_location.location_nk, stored as the IBGE identifier in string format."
        tests: [not_null]

      - name: year
        description: "Reference year of the metric."
        tests: [not_null]

      - name: population_census
        description: "Population from census indicator (96385)."

      - name: population_estimated
        description: "Population from estimate indicator (29171)."

      - name: population_preferred
        description: "Preferred population value: census first, estimated as fallback."

      - name: population_preferred_source
        description: "Source used for preferred population (census or estimate)."

      - name: area_km2
        description: "Territorial area in square kilometers (indicators 29167 and 48980)."

      - name: density_census
        description: "Census density = population_census / area_km2."

      - name: density_estimated
        description: "Estimated density = population_estimated / area_km2."

      - name: density_preferred
        description: "Preferred density = population_preferred / area_km2."

      - name: _extraction_ts
        description: "Latest extraction timestamp among the source IBGE indicators for the same location and year."
        tests: [not_null]

      - name: _updated_at
        description: "Timestamp when this Gold row was last written."
        tests: [not_null]