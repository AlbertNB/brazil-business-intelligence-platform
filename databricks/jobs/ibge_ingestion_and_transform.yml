resources:
  jobs:
    IBGE_Ingestion_and_Transform:
      name: IBGE Ingestion and Transform
      tasks:
        - task_key: bronze_ingestion
          spark_python_task:
            python_file: ../ingestion/autoloader/bronze_ingestion.py
            parameters:
              - --source
              - ibge
              - --streams
              - "*"
              - --multiline
              - "true"
              - --landing_root
              - ${var.LANDING_ROOT}
              - --autoloader_root
              - ${var.AUTOLOADER_ROOT}
              - --bronze_root
              - ${var.BRONZE_ROOT}
              - --catalog
              - bbip_prod
              - --target_schema
              - bronze
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
